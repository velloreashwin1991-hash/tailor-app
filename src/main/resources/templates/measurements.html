<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Measurements</title>
</head>
<body>

<h2>Add Measurement</h2>

<form action="/measurements/save" method="post">
    Chest: <input type="text" name="chest"><br>
    Waist: <input type="text" name="waist"><br>
    Sleeve: <input type="text" name="sleeve"><br>
    <button type="submit">Save</button>
</form>

<h2>Measurement List</h2>

<table border="1">
    <tr>
        <th>ID</th><th>Chest</th><th>Waist</th><th>Sleeve</th>
    </tr>
    <tr th:each="m : ${measurements}">
        <td th:text="${m.id}"></td>
        <td th:text="${m.chest}"></td>
        <td th:text="${m.waist}"></td>
        <td th:text="${m.sleeve}"></td>
    </tr>
</table>

<a href="/">Back</a>

</body>
